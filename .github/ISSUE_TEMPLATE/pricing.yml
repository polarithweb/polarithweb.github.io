name: Add Project Pricing
description: Add a new pricing tier to the website
title: "[Pricing]: "
labels: ["pricing"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: Name of the pricing plan (e.g., Premium Production Grade Website)
      placeholder: Enter plan title here...
    validations:
      required: true
  - type: input
    id: price
    attributes:
      label: Price
      description: Price in INR (e.g., 3499)
      placeholder: "3499"
    validations:
      required: true
  - type: textarea
    id: features
    attributes:
      label: Features
      description: List 3-4 features, one per line. Do not use bullet points, just hit enter for a new line.
      placeholder: |
        AI Chatbot included
        Professional SEO
        Premium Animations
    validations:
      required: true
  - type: dropdown
    id: tag
    attributes:
      label: Tag (Optional)
      description: Select a highlight tag for this card.
      options:
        - No Tag
        - Popular
        - Best Package
